# Moved from hermes-sankhya-25 along with the rest of the NADI node identity
# (docs/BEFUND.md §0 decision a). Deliberately NOT scheduled: NADI stays
# disconnected until Proof 4 is explicitly approved (see
# docs/ARCHITECTURE_VISION.md §8/§12). workflow_dispatch only, so it can be
# hand-run for testing without going live on a cron.
#
# Hard-set to secrets.GITHUB_TOKEN (docs/MOLTBOOK_CONTRACT_NOTES.md /
# docs/BEFUND.md token-scope check): previously used
# `secrets.FEDERATION_PAT || secrets.GITHUB_TOKEN`. No FEDERATION_PAT
# secret exists in this repo, so this was a no-op today, but the pattern
# would have silently started using a broader PAT the moment one was ever
# added here for any other reason. Removed the fallback entirely.
name: Node Heartbeat

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: heartbeat
  cancel-in-progress: false

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install cryptography

      - name: Download nadi_kit
        env:
          NODE_PRIVATE_KEY: ${{ secrets.NODE_PRIVATE_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Pinned to a specific commit (docs/SPEC.md §C.5), not `@main` —
        # an unpinned external download meant this workflow's behavior
        # could change underneath it without any diff in this repo. SHA
        # is the latest commit touching nadi_kit.py in steward-federation
        # as of this slice (verified via `gh api
        # repos/kimeisele/steward-federation/commits?path=nadi_kit.py`).
        # Bump deliberately, not silently, when a new nadi_kit.py version
        # is needed.
        run: |
          curl -sL -H "Authorization: token ${GH_TOKEN}" \
            "https://raw.githubusercontent.com/kimeisele/steward-federation/e1321e575b8b56ab624e4e5c2edd735213c895f5/nadi_kit.py" \
            -o nadi_kit.py
          python3 -c "import sys; sys.path.insert(0, '.'); import nadi_kit; print('nadi_kit loaded')"

      - name: Run NADI heartbeat cycle
        env:
          NODE_PRIVATE_KEY: ${{ secrets.NODE_PRIVATE_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 nadi_kit.py --peer-json data/federation/peer.json sync
          python3 nadi_kit.py --peer-json data/federation/peer.json heartbeat --health 1.0
          python3 nadi_kit.py --peer-json data/federation/peer.json sync

      - name: Commit federation state
        if: always()
        # `git push || true` removed (docs/SPEC.md §C.5): a silently
        # swallowed push failure here means committed-but-unpushed state,
        # which is indistinguishable from a real push in the job log —
        # exactly the kind of "looks green, isn't" gap this slice hardens
        # against. A push failure should fail the job.
        run: |
          git config user.name "federation-bot"
          git config user.email "bot@federation"
          git add data/federation/ || true
          git diff --cached --quiet || git commit -m "chore: heartbeat state"
          git push
