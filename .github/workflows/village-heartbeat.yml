# Deliberately NOT scheduled after the move from hermes-sankhya-25: this is
# the workflow that drives Proof 1 (Moltbook registration ingest, see
# docs/SPEC.md §1). Kim said "Stop und warte auf mein Go, bevor der erste
# echte Moltbook-Registrierungsversuch (Proof 1) scharf geschaltet wird" —
# re-enable the schedule trigger only after that explicit approval.
name: Agent Village Heartbeat

on:
  workflow_dispatch:

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: pip install cryptography

      - name: Run Village Heartbeat
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          NODE_PRIVATE_KEY: ${{ secrets.NODE_PRIVATE_KEY }}
          MOLTBOOK_API_KEY: ${{ secrets.MOLTBOOK_API_KEY }}
          # Repo variable, not a secret — this is a public post ID, not
          # sensitive. No hardcoded fallback (see village/heartbeat.py):
          # if unset, the Moltbook scan logs and skips instead of silently
          # using the wrong post.
          MB_REG_POST: ${{ vars.MB_REG_POST }}
          # Feature flags (docs/BEFUND.md §12/§13), all default off. Were
          # never actually wired through to the workflow before — setting
          # the repo variable alone did nothing (found while running the
          # controlled Brain test, docs/BEFUND.md §17).
          VILLAGE_BRAIN_ENABLED: ${{ vars.VILLAGE_BRAIN_ENABLED }}
          VILLAGE_BOUNTIES_ENABLED: ${{ vars.VILLAGE_BOUNTIES_ENABLED }}
          VILLAGE_NADI_ENABLED: ${{ vars.VILLAGE_NADI_ENABLED }}
        # Run as a module, not `python3 village/heartbeat.py` directly.
        # Direct script invocation puts village/ itself on sys.path, not
        # the repo root, so `from village.moltbook_captcha import ...`
        # fails with ModuleNotFoundError: No module named 'village' — hit
        # live 2026-07-18 (run 29659480067), see docs/BEFUND.md §11.
        # `-m` runs with the repo root on sys.path, resolving it correctly.
        run: python3 -m village.heartbeat

      - name: Commit state changes
        run: |
          git config user.name "village-heartbeat[bot]"
          git config user.email "village@agent-village"
          git add data/village/ .github/ISSUE_TEMPLATE/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "heartbeat: update village state [skip ci]"
            git push
          fi
