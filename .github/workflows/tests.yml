# Pure verification infrastructure — no product scope change. Runs the
# existing test suite on push/PR to main so "N/N grün" is independently
# checkable in the Actions log instead of only ever asserted locally
# (see docs/BEFUND.md §20). Ruff and mypy steps added during Type Safety
# Foundation 01 — the job id `pytest` is intentionally unchanged to
# preserve the existing branch-protection required-check name.
name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest ruff mypy

      - name: Run Ruff (E, F, I)
        run: ruff check --select E,F,I village/ scripts/ tests/

      - name: Run mypy
        run: python3 -m mypy village/ scripts/ --ignore-missing-imports --explicit-package-bases

      - name: Run test suite
        run: python3 -m pytest tests/ -v
