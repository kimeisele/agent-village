# Pure verification infrastructure. Ruff and mypy steps added during Type
# Safety Foundation 01. The job id ``pytest`` is intentionally unchanged to
# preserve the existing branch-protection required-check name.
name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run Ruff
        run: ruff check village/ scripts/ tests/

      - name: Run Ruff format check
        run: ruff format --check village/ scripts/ tests/

      - name: Run mypy
        run: python3 -m mypy village scripts

      - name: Run test suite
        run: python3 -m pytest tests/ -v
